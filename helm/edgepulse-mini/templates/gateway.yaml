apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    app: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: gateway
        image: {{ .Values.gateway.image }}
        imagePullPolicy: {{ .Values.gateway.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
          name: http-metrics
        env:
        - name: MQTT_BROKER_HOST
          value: "mosquitto"
        - name: MQTT_BROKER_PORT
          value: "1883"
        - name: PORT
          value: "{{ .Values.gateway.port }}"
---
apiVersion: v1
kind: Service
metadata:
  name: go-service
  labels:
    app: gateway
spec:
  ports:
  - port: {{ .Values.gateway.port }}
    targetPort: http-metrics
    name: http-metrics
  selector:
    app: gateway
