apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    rule_files:
      - "/etc/prometheus/alert.rules"

    scrape_configs:
      - job_name: 'edge_go_service'
        scrape_interval: 5s
        static_configs:
          - targets: ['go-service:8080']

  alert.rules: |
    groups:
    - name: machine_alerts
      rules:
      - alert: HighVibration
        expr: machine_vibration_rms_g > 3.0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Kritische Vibration an {{ "{{" }} $labels.machine_id {{ "}}" }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: {{ .Values.prometheus.image }}
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          - "--web.console.libraries=/usr/share/prometheus/console_libraries"
          - "--web.console.templates=/usr/share/prometheus/consoles"
          - "--web.cors.origin=.*"
        ports:
        - containerPort: {{ .Values.prometheus.port }}
          name: web
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        - name: config
          mountPath: /etc/prometheus/alert.rules
          subPath: alert.rules
        - name: data
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}-prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: edgepulse-mini-prometheus
  labels:
    app: prometheus
spec:
  ports:
  - port: {{ .Values.prometheus.port }}
    targetPort: web
    name: web
  selector:
    app: prometheus
